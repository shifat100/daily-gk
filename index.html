<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ==========================================
         ULTIMATE SEO META TAGS (2025 Edition)
         ========================================== -->
    <title>সাধারণ জ্ঞান ২০২৫ (General Knowledge) | ভূগোল ও কুইজ - Daily GK MCQ</title>

    <meta name="keywords" content="সাধারণ জ্ঞান, General Knowledge 2025, Sadharon Gyan, ভূগোল সাধারণ জ্ঞান, Geography GK Bangla, বিসিএস প্রস্তুতি, BCS Preparation, Daily GK Quiz, সাধারণ জ্ঞান প্রশ্ন ও উত্তর, সাম্প্রতিক বিশ্ব, shifat100, কারেন্ট এফেয়ার্স">
    <meta name="author" content="A.I. Shifat">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="top-bar">
        <div class="brand-area">
            <button id="menuToggle" class="icon-btn" aria-label="Menu">&#9776;</button>
            <h1 class="brand">Daily GK</h1>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            
            <!-- Dark Mode Toggle Button (SVG) -->
            <button id="darkModeBtn" class="icon-btn" aria-label="Toggle Dark Mode">
                <!-- Moon Icon -->
                <svg id="moonIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <!-- Sun Icon -->
                <svg id="sunIcon" style="display:none;" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>

            <!-- Cart Button -->
            <button id="cartViewBtn" class="icon-btn" style="position: relative;" aria-label="View Cart">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cartCount" class="cart-badge">0</span>
            </button>
            
            <select id="viewMode" class="styled-select">
                <option value="quiz">Quiz Mode</option>
                <option value="study">Study Mode</option>
                <option value="exam">🔥 Exam Mode</option>
            </select>
        </div>
    </header>

    <div class="app-body">
        
        <!-- SIDEBAR -->
        <aside class="sidebar" id="appSidebar">
            <ul id="categoryTree" class="tree-view">
                <li style="padding: 20px; text-align: center; color: #888;">Loading Topics...</li>
            </ul>
        </aside>
        
        <div id="sidebarOverlay"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content" id="mainScroll">
            
            <div id="cartActions" style="display:none;float:right">
                <button id="exitCart" class="danger-btn">Exit Cart</button>
            </div>  

            <!-- Controls -->
            <div class="controls-area" id="mainControls">
                <input type="text" id="searchInput" placeholder="Search GK questions...">
                <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
                    <input type="checkbox" id="shuffleCheck"> Shuffle
                </label>
                <select id="sortSelect" class="styled-select">
                    <option value="asc">Sort: Asc</option>
                    <option value="desc">Sort: Desc</option>
                </select>
                <select id="perPageSelect" class="styled-select" aria-label="Questions per page">
                    <option value="10" selected>10 / Page</option>
                    <option value="20">20 / Page</option>
                    <option value="50">50 / Page</option>
                    <option value="100">100 / Page</option>
                </select>
            </div>

            <!-- EXAM HEADER (Hidden by default) -->
            <div id="examHeader" class="exam-header" style="display:none;">
                <div style="display:flex; align-items:center; gap:8px; font-weight:bold;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Time Left: <span id="examTimerDisplay" style="font-size: 1.2rem;">00:00</span>
                </div>
                <button id="submitExamBtn" class="primary-btn">Submit Exam</button>
            </div>

            <!-- EXAM RESULT (Hidden by default) -->
            <div id="examResultBox" class="exam-result" style="display:none;"></div>

            <div id="topicHeader" style="margin-bottom:15px; color:var(--primary); font-weight:bold; display:none;">
                Viewing: <span id="topicName">All</span>
            </div>

            <!-- Question List -->
            <div id="questionList"></div>

            <!-- Pagination -->
            <div id="paginationControls" class="pagination"></div>

            <footer class="app-footer">
                <div>&copy; 2025 Daily GK MCQ. All Rights Reserved.</div>
            </footer>
        </main>
    </div>
    
    <button id="backToTop" title="Go to top">&#9650;</button>
    <script src="script.js"></script>
</body>
</html>
